services:

  neo4j:
    image: neo4j:5.18
    container_name: graphrag_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
    networks:
      - graphrag_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:latest
    container_name: graphrag_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - graphrag_net
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag_api
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      GEMINI_MODEL: gemini-1.5-flash
    
    networks:
      - graphrag_net
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: graphrag_streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: http://fastapi:8001
    depends_on:
      - fastapi
    networks:
      - graphrag_net
    restart: unless-stopped

volumes:
  neo4j_data:
  chroma_data:

networks:
  graphrag_net:
    driver: bridge